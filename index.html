<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk/dist/index.umd.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 10px;
      margin: 0;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 10px 14px;
      box-sizing: border-box;
      cursor: pointer;
      background-color: #e05d1c;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background-color 0.2s ease;
    }

    button:hover:not(:disabled) {
      filter: brightness(0.95);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .muted {
      font-size: 12px;
      color: #666;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="stack">
    <div id="status" class="muted">Ready.</div>

    <button id="pushButton" type="button" disabled>
      <span id="buttonText">Loading...</span>
    </button>
  </div>

  <script>
    let sdk = null;
    let dealId = null;

    const statusEl = document.getElementById("status");
    const pushButton = document.getElementById("pushButton");
    const buttonText = document.getElementById("buttonText");

    function getDealIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return (params.get("selectedIds") || "").split(",")[0] || null;
    }

    async function showSnackbarSafe(message) {
      // Snackbar is cosmetic only - never let it affect the real success/failure state
      try {
        if (sdk) {
          await sdk.execute("SHOW_SNACKBAR", {
            message,
            duration: 3000
          });
        }
      } catch (snackbarError) {
        console.warn("Snackbar failed (non-critical):", snackbarError);
      }
    }

    async function init() {
      try {
        if (!window.AppExtensionsSDK) {
          throw new Error("AppExtensionsSDK not found");
        }

        sdk = new window.AppExtensionsSDK();
        await sdk.initialize();
        console.log("SDK initialized");

        try {
          await sdk.execute("resize", { height: 120 });
        } catch (resizeError) {
          console.warn("Resize failed:", resizeError);
        }

        dealId = getDealIdFromUrl();
        console.log("Resolved dealId:", dealId);

        if (!dealId) {
          statusEl.textContent = "No deal ID found.";
          buttonText.textContent = "Unavailable";
          pushButton.disabled = true;
          return;
        }

        statusEl.textContent = "Ready.";
        buttonText.textContent = "Push to ConnectWise";
        pushButton.disabled = false;
      } catch (error) {
        console.error("Init failed:", error);
        statusEl.textContent = "Failed to load panel.";
        buttonText.textContent = "Unavailable";
        pushButton.disabled = true;
      }
    }

    pushButton.addEventListener("click", async (e) => {
      e.preventDefault();

      try {
        if (!dealId) {
          throw new Error("No deal ID found");
        }

        pushButton.disabled = true;
        buttonText.textContent = "Pushing...";
        statusEl.textContent = "Sending to ConnectWise...";

        const spinner = document.createElement("div");
        spinner.classList.add("spinner");
        pushButton.appendChild(spinner);

        const response = await fetch(
          "https://massiveit.app.n8n.cloud/webhook/deal_to_connectwise",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dealId })
          }
        );

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        // Success - set this BEFORE the snackbar call so a snackbar hiccup can't overwrite it
        statusEl.textContent = "Pushed to ConnectWise successfully.";
        buttonText.textContent = "Push to ConnectWise";

        await showSnackbarSafe("Deal pushed to ConnectWise successfully");
      } catch (error) {
        console.error("Error pushing to ConnectWise:", error);
        statusEl.textContent = "Failed to push to ConnectWise.";
        buttonText.textContent = "Push to ConnectWise";

        await showSnackbarSafe(error.message || "Something went wrong");
      } finally {
        pushButton.disabled = false;
        const spinner = pushButton.querySelector(".spinner");
        if (spinner) spinner.remove();
      }
    });

    init();
  </script>
</body>
</html>
